name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Agent (agents/*.md)
        - Skill (skills/*/SKILL.md)
        - Hook (hooks/scripts/*.mjs)
        - Installer (install.sh)
        - Other
    validations:
      required: true

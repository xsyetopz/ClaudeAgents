name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Shared source/generator (`source/`, `scripts/generate.mjs`)
        - Claude assets (`claude/`)
        - Codex assets (`codex/`)
        - OpenCode assets (`opencode/`)
        - Installer/build scripts
        - CI/CD
        - Other
    validations:
      required: true

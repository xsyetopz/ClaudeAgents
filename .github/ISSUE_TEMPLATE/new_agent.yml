name: New Agent Submission
description: Submit a community agent
labels: ["agent-submission"]
body:
  - type: input
    id: name
    attributes:
      label: Agent name
      placeholder: "e.g., Prometheus"
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: What does this agent do? When should it be used?
    validations:
      required: true
  - type: dropdown
    id: targets
    attributes:
      label: Target systems
      options:
        - Shared across Claude, Codex, and OpenCode
        - Claude Code only
        - Codex only
        - OpenCode only
    validations:
      required: true
  - type: textarea
    id: definition
    attributes:
      label: Agent definition
      description: Describe the role, constraints, tools, expected outputs, and any platform-specific differences. Prefer the canonical source shape, not a hand-written generated file.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: testing
    attributes:
      label: How did you test it?
      description: Describe test scenarios and results.
    validations:
      required: true

name: Bug Report
description: Report a bug in openagentsbtw
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target system
      options:
        - Claude Code
        - Codex
        - OpenCode
        - Shared generator/source
    validations:
      required: true
  - type: input
    id: tool-version
    attributes:
      label: Tool version
      placeholder: "e.g., Claude Code 2.1.80, Codex CLI x.y.z, OpenCode x.y.z"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Generated repo checkout
        - Claude plugin install
        - Codex plugin install
        - OpenCode install
        - Manual/custom setup
    validations:
      required: true

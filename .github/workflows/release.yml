name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies
        run: sudo apt-get install -y jq shellcheck
      - name: Lint
        run: shellcheck install.sh build-plugin.sh uninstall.sh hooks/scripts/_run.sh statusline/statusline-command.sh
      - name: Test
        run: node --test tests/test-*.mjs
      - name: Build all tiers
        run: |
          ./build-plugin.sh pro
          mv dist/claude-agents-plugin dist/cca-pro
          ./build-plugin.sh max
          mv dist/claude-agents-plugin dist/cca-max
      - name: Create release archives
        run: |
          cd dist
          tar -czf cca-pro.tar.gz cca-pro/
          tar -czf cca-max.tar.gz cca-max/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cca-pro.tar.gz
            dist/cca-max.tar.gz

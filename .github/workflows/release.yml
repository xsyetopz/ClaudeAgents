name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies
        run: sudo apt-get install -y jq shellcheck
      - name: Lint
        run: shellcheck install.sh build-plugin.sh uninstall.sh hooks/scripts/_run.sh statusline/statusline-command.sh
      - name: Test
        run: node --test tests/test-*.mjs
      - name: Build plugin
        run: ./build-plugin.sh
      - name: Create release archive
        run: |
          cd dist
          tar -czf cca-plugin.tar.gz claude-agents-plugin/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/cca-plugin.tar.gz

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Install dependencies
        run: sudo apt-get install -y jq shellcheck
      - name: Install root deps
        run: bun install --frozen-lockfile
      - name: Lint
        run: shellcheck install.sh build-plugin.sh uninstall.sh claude/hooks/scripts/_run.sh claude/statusline/statusline-command.sh opencode/install.sh opencode/templates/hooks/install.sh opencode/templates/hooks/pre-commit opencode/templates/hooks/pre-push
      - name: Check generated outputs
        run: bun run check:generated
      - name: Test
        run: bun run test
      - name: Install OpenCode deps
        working-directory: opencode
        run: bun install --frozen-lockfile
      - name: Test OpenCode
        working-directory: opencode
        run: bun run test
      - name: Typecheck OpenCode
        working-directory: opencode
        run: bun run typecheck
      - name: Build plugin
        run: ./build-plugin.sh
      - name: Create release archive
        run: |
          cd dist
          tar -czf openagentsbtw-claude-plugin.tar.gz openagentsbtw-claude-plugin/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/openagentsbtw-claude-plugin.tar.gz

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck install.sh build-plugin.sh uninstall.sh hooks/scripts/_run.sh statusline/statusline-command.sh

  jsonlint:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Validate JSON files
        run: |
          find . -name '*.json' -not -path './node_modules/*' -not -path './dist/*' | while read f; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>&1 || { echo "Invalid JSON: $f"; exit 1; }
          done

  hook-tests:
    name: Hook Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Run tests
        run: node --test tests/test-*.mjs

  install-test:
    name: Install Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Validate script syntax
        run: |
          bash -n install.sh
          bash -n build-plugin.sh
          bash -n uninstall.sh
          echo "All scripts parse OK"
      - name: Validate plugin manifest
        run: |
          node -e "const p = JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8')); console.log('Plugin: ' + p.name + ' v' + p.version)"

  plugin-build:
    name: Plugin Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Build plugin
        run: ./build-plugin.sh
      - name: Validate build output
        run: |
          test -d dist/claude-agents-plugin
          test -f dist/claude-agents-plugin/.claude-plugin/plugin.json
          node -e "JSON.parse(require('fs').readFileSync('dist/claude-agents-plugin/.claude-plugin/plugin.json','utf8'))"
          # No placeholder remnants
          ! grep -r '__SHARED_CONSTRAINTS__' dist/claude-agents-plugin/ || exit 1
          ! grep -r '__PACKAGE_CONSTRAINTS__' dist/claude-agents-plugin/ || exit 1
          echo "Plugin build validated"

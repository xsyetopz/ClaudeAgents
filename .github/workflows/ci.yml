name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck install.sh build-plugin.sh uninstall.sh claude/hooks/scripts/_run.sh claude/statusline/statusline-command.sh opencode/install.sh

  jsonlint:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Validate JSON files
        run: |
          find . -name '*.json' -not -path './node_modules/*' -not -path './dist/*' | while read f; do
            bun -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>&1 || { echo "Invalid JSON: $f"; exit 1; }
          done

  generated:
    name: Generated Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Install root deps
        run: bun install --frozen-lockfile
      - name: Check generated outputs
        run: bun run check:generated

  hook-tests:
    name: Node Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Install root deps
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun run test

  opencode:
    name: OpenCode Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Install OpenCode deps
        working-directory: opencode
        run: bun install --frozen-lockfile
      - name: Run OpenCode tests
        working-directory: opencode
        run: bun run test
      - name: Run OpenCode typecheck
        working-directory: opencode
        run: bun run typecheck

  install-test:
    name: Install Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Validate script syntax
        run: |
          bash -n install.sh
          bash -n build-plugin.sh
          bash -n uninstall.sh
          bash -n opencode/install.sh
          echo "All scripts parse OK"
      - name: Validate plugin manifest
        run: |
          bun -e "const p = JSON.parse(require('fs').readFileSync('claude/.claude-plugin/plugin.json','utf8')); console.log('Claude plugin: ' + p.name + ' v' + p.version)"
      - name: Validate Codex plugin manifest
        run: |
          bun -e "const p = JSON.parse(require('fs').readFileSync('codex/plugin/openagentsbtw/.codex-plugin/plugin.json','utf8')); console.log('Codex plugin: ' + p.name + ' v' + p.version)"

  plugin-build:
    name: Claude Plugin Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Build plugin
        run: ./build-plugin.sh
      - name: Validate build output
        run: |
          test -d dist/openagentsbtw-claude-plugin
          test -f dist/openagentsbtw-claude-plugin/.claude-plugin/plugin.json
          bun -e "JSON.parse(require('fs').readFileSync('dist/openagentsbtw-claude-plugin/.claude-plugin/plugin.json','utf8'))"
          ! grep -r '__SHARED_CONSTRAINTS__' dist/openagentsbtw-claude-plugin/ || exit 1
          ! grep -r '__PACKAGE_CONSTRAINTS__' dist/openagentsbtw-claude-plugin/ || exit 1
          echo "Plugin build validated"

name: Olympus CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: olympus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Olympus quality gates
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run olympus:test
      - name: Verify
        run: bun run olympus:verify -- --json
      - name: Catalog smoke
        run: bun run olympus:catalog -- --json
      - name: Lint Olympus package
        run: bunx biome check packages/olympus --max-diagnostics 200
      - name: Diff whitespace check
        run: git diff --check

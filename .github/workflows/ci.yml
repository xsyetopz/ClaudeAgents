name: Olympi CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: olympi-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Olympi quality gates
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: CLI smoke
        run: bun run olympi:smoke
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run olympi:test
      - name: Biome check
        run: bun run biome:check
      - name: Verify
        run: bun run olympi:verify -- --json
      - name: Catalog
        run: bun run olympi:catalog -- --json

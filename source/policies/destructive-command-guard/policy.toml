id = "destructive-command-guard"
kind = "policy"
title = "Destructive Command Guard"
description = "Block known destructive shell commands before tool execution."
category = "execution_guard"
severity = "error"
event_intent = "tool_execution"
blocking = true
failure_mode = "fail_closed"
handler_class = "command_script"
matcher = "shell_command"
runtime_script = "runtime/destructive-command-guard.mjs"
surface_events = ["PreToolUse", "tool.execute.before"]
test_payloads = ["destructive-command-guard/basic.json"]
tests = ["destructive-command-guard.test.ts"]
surfaces = ["codex", "claude", "opencode"]

[surface_mappings]
codex = "PreToolUse"
claude = "PreToolUse"
opencode = "tool.execute.before"

id = "source-drift-guard"
kind = "policy"
title = "Source Drift Guard"
description = "Detect missing or changed managed files before session completion."
category = "drift_guard"
severity = "error"
event_intent = "completion"
hook_event_category = "completion"
blocking = true
failure_mode = "fail_closed"
handler_class = "command_script"
matcher = "managed_manifest"
runtime_script = "runtime/source-drift-guard.mjs"
surface_events = ["Stop", "session.idle"]
test_payloads = ["source-drift-guard/basic.json"]
tests = ["source-drift-guard.test.ts"]
surfaces = ["codex", "claude", "opencode"]

[surface_mappings]
codex = "Stop"
claude = "Stop"
opencode = "session.idle"

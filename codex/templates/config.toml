# openagentsbtw sample Codex profiles

commit_attribution = "Co-Authored-By: Codex <codex@users.noreply.github.com>"

[agents.athena]
description = "Architecture and planning agent. Produces decision-complete plans, sequencing, and tradeoff analysis."

[agents.hephaestus]
description = "Implementation agent. Makes focused code changes and refactors with minimal diffs."

[agents.nemesis]
description = "Review agent. Audits correctness, regressions, security, and missing tests."

[agents.atalanta]
description = "Test agent. Runs tests, analyzes failures, and reports evidence-heavy root causes."

[agents.calliope]
description = "Documentation agent. Updates docs precisely and avoids filler."

[agents.hermes]
description = "Exploration/tracing agent. Maps repo architecture and follows dependencies end-to-end."

[agents.odysseus]
description = "Orchestration agent. Coordinates multi-step work and delegates bounded subtasks with disjoint ownership."

agents.max_threads = 6
agents.max_depth = 1

[profiles.openagentsbtw-go]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "medium"
model_verbosity = "medium"
personality = "none"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.openagentsbtw-go.features]
codex_hooks = true
sqlite = true
multi_agent = true
fast_mode = false

